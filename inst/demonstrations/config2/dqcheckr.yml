# dqcheckr global config for the folder-scan demonstration
# Same thresholds as config/dqcheckr.yml; output directed to output2/.

snapshot_db:       "output2/snapshots.sqlite"
report_output_dir: "output2/reports/"

default_rules:
  # birth_year is 51% missing, mass 32%, homeworld 11% — all expected gaps.
  # Threshold set at 0.60 so those pass.
  # vehicles (87%) and starships (77%) will still FAIL — genuinely sparse.
  type_inference_threshold: 0.90
  max_missing_rate: 0.60

  # All numeric columns are clean integers / doubles — 1% tolerance
  max_non_numeric_rate: 0.01
  # warn_non_numeric_rate: 0.0  # WARN threshold for QC-11 (default 0.0: any non-numeric triggers WARN)

  # Dataset has 87 rows
  min_row_count: 80
  # max_row_count: 10000  # FAIL if file exceeds this row count
  # max_file_size_mb: 100 # FAIL if file exceeds this size in MB

  # Version comparison thresholds
  max_row_count_change_pct:       0.10
  max_numeric_mean_shift_pct:     0.20
  max_missing_rate_change_pp:     5.0
  # missing_rate_change_severity: warn  # warn or fail (default: warn)
  max_non_numeric_rate_change_pp: 1.0

  # Setting any flag_* to false suppresses the WARN/FAIL from the report.
  # Schema changes are always written to the snapshot database regardless.
  flag_new_columns:         true
  flag_dropped_columns:     true
  flag_type_changes:        true
  flag_column_order_change: true
  # column_order_severity: warn  # override format default: warn or fail
