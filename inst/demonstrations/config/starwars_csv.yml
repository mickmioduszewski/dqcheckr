# Per-dataset config for starwars CSV
dataset_name: "starwars_csv"
current_file: "data/starwars.csv"
format: csv
encoding: "UTF-8"
delimiter: ","

snapshot_db:       "output/snapshots.sqlite"
report_output_dir: "output/reports/"

# All 14 columns expected
expected_columns:
  - name
  - height
  - mass
  - hair_color
  - skin_color
  - eye_color
  - birth_year
  - sex
  - gender
  - homeworld
  - species
  - films
  - vehicles
  - starships

# name is the natural key — all 87 values are unique
key_columns:
  - name

rule_overrides:
  max_missing_rate: 0.60
  min_row_count:    80

column_rules:
  sex:
    allowed_values: ["male", "female", "none", "hermaphroditic"]
  gender:
    allowed_values: ["masculine", "feminine"]
  height:
    min_value: 50
    max_value: 300
  mass:
    min_value: 1
    max_value: 2000
